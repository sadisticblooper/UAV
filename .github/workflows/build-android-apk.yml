name: Build Android APK

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ '**' ]
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-android-apk:
    name: Build Android APK
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'microsoft'
          java-version: '21'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/*.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Cache MAUI workload
        id: cache-maui-workload
        uses: actions/cache@v4
        with:
          path: |
            C:\Program Files\dotnet\sdk-manifests
            C:\Program Files\dotnet\packs
            C:\Program Files\dotnet\metadata
          key: maui-workload-${{ runner.os }}-${{ env.DOTNET_VERSION }}-v1
          restore-keys: |
            maui-workload-${{ runner.os }}-${{ env.DOTNET_VERSION }}-

      - name: Install MAUI workload
        if: steps.cache-maui-workload.outputs.cache-hit != 'true'
        run: dotnet workload install maui --ignore-failed-sources

      - name: Restore dependencies
        run: dotnet restore "UAV/UAV.csproj"

      - name: Publish Android APK
        run: dotnet publish "UAV/UAV.csproj" -f net10.0-android -c Release --no-restore /p:AndroidPackageFormat=apk

      - name: Remove unsigned APKs
        run: |
          Get-ChildItem "UAV/bin/Release/net10.0-android/publish/*.apk" | Where-Object { $_.Name -notlike "*-signed.apk" } | Remove-Item
        shell: pwsh

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: 'UAV/bin/Release/net10.0-android/publish/*.apk'
          retention-days: 1
